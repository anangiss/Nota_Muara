                link.download = 'Nota-' + no + '-' + nama + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                const nomorWA = kontak.replace(/\D/g, '').replace(/^0/, '62');
                const pesan = encodeURIComponent(
                    'Halo ' + nama + 
                    ', berikut nota servis Anda dari Muara Celluler. ' +
                    'File nota sudah otomatis terdownload. 🙏'
                );

                // Mobile support share image langsung
                canvas.toBlob(async function(blob) {

                    const file = new File(
                        [blob],
                        'Nota-' + no + '-' + nama + '.png',
                        { type: 'image/png' }
                    );

                    // Jika browser support Web Share API
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'Nota Servis',
                                text: 'Nota servis pelanggan'
                            });

                            setTimeout(() => {
                                window.open(
                                    'https://wa.me/' + nomorWA + '?text=' + pesan,
                                    '_blank'
                                );
                            }, 1000);

                        } catch (e) {
                            window.open(
                                'https://wa.me/' + nomorWA + '?text=' + pesan,
                                '_blank'
                            );
                        }
                    } else {
                        // Fallback desktop/browser biasa
                        setTimeout(() => {
                            window.open(
                                'https://wa.me/' + nomorWA + '?text=' + pesan,
                                '_blank'
                            );
                        }, 1000);
                    }

                }, 'image/png');

            });
        }, 1500);
                }, 'image/jpeg', 0.95);
            });
        }
    </script>
